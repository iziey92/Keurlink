<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Connexion - KeurLink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Connectez-vous à votre compte KeurLink."
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Variables & Base */
      :root {
        --accent: #f97316;
        --accent-light: #fb923c;
        --accent-glow: rgba(249, 115, 22, 0.4);
        --bg-input: rgba(0, 0, 0, 0.5);
        --border-light: rgba(255, 255, 255, 0.15);
      }

      body {
        background-color: var(--bg-primary);
        color: #ffffff;
        overflow-x: hidden;
      }

      /* CORRECTION DU MAIN : 
         On s'assure que le contenu commence SOUS le header fixe.
         Le min-height assure qu'il prend au moins tout l'écran.
      */
      main {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 160px; /* Espace large pour éviter le header fixe */
        padding-bottom: 60px;
        position: relative;
        z-index: 1;
        box-sizing: border-box; /* Important pour le calcul de hauteur */
      }

      /* Animation d'apparition */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Carte de connexion */
      .login-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--border-light);
        border-radius: 30px;
        padding: 50px 40px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
        animation: fadeInUp 0.8s ease forwards;
      }

      /* Lueur décorative */
      .login-card::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(249, 115, 22, 0.1) 0%,
          transparent 60%
        );
        pointer-events: none;
        animation: rotateGlow 10s linear infinite;
      }

      @keyframes rotateGlow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .login-header {
        text-align: center;
        margin-bottom: 35px;
        position: relative;
        z-index: 2;
      }

      .login-header h2 {
        font-family: "Outfit", sans-serif;
        font-size: 2.2rem;
        font-weight: 700;
        margin-bottom: 10px;
        background: linear-gradient(
          135deg,
          #ffffff 0%,
          var(--accent-light) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .login-header p {
        color: #cbd5e1;
        font-size: 0.95rem;
      }

      /* Formulaire */
      .form-group {
        margin-bottom: 20px;
        position: relative;
        z-index: 2;
      }

      .input-wrapper {
        position: relative;
      }

      .input-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--fg-muted);
        pointer-events: none;
        transition: color 0.3s ease;
      }

      .form-group input {
        width: 100%;
        padding: 16px 20px 16px 50px; /* Espace pour l'icône */
        background: var(--bg-input);
        border: 1px solid var(--border-light);
        color: #ffffff;
        border-radius: 12px;
        font-size: 1rem;
        font-family: "Inter", sans-serif;
        transition: all 0.3s ease;
        outline: none;
      }

      .form-group input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .form-group input:focus {
        border-color: var(--accent);
        background: rgba(0, 0, 0, 0.7);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .form-group input:focus + .input-icon {
        color: var(--accent);
      }

      /* Options supplémentaires */
      .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        font-size: 0.9rem;
        position: relative;
        z-index: 2;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #cbd5e1;
        cursor: pointer;
      }

      .remember-me input {
        accent-color: var(--accent);
      }

      .forgot-link {
        color: var(--accent-light);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }

      .forgot-link:hover {
        color: #ffffff;
        text-decoration: underline;
      }

      /* Bouton de connexion */
      .btn-login {
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent), var(--accent-light));
        color: #000;
        font-weight: 700;
        font-size: 1.05rem;
        border: none;
        cursor: pointer;
        position: relative;
        z-index: 2;
        transition:
          transform 0.2s ease,
          box-shadow 0.3s ease;
        box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(249, 115, 22, 0.4);
      }

      /* Separator */
      .separator {
        display: flex;
        align-items: center;
        margin: 30px 0;
        color: #64748b;
        font-size: 0.85rem;
        position: relative;
        z-index: 2;
      }
      .separator::before,
      .separator::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }
      .separator span {
        padding: 0 15px;
      }

      /* Lien Inscription */
      .signup-link {
        text-align: center;
        font-size: 0.95rem;
        color: #94a3b8;
        position: relative;
        z-index: 2;
      }

      .signup-link a {
        color: #ffffff;
        font-weight: 600;
        text-decoration: none;
        margin-left: 5px;
        transition: color 0.2s;
      }

      .signup-link a:hover {
        color: var(--accent-light);
      }

      /* Footer */
      footer {
        background: rgba(0, 0, 0, 0.6);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding: 25px 0;
        position: relative;
        z-index: 2;
      }

      footer .container {
        text-align: center;
      }

      footer p {
        color: #ffffff;
        font-size: 0.9rem;
      }

      footer strong {
        color: var(--accent-light);
        font-weight: 700;
      }

      /* Responsive */
      @media (max-width: 480px) {
        .login-card {
          padding: 30px 20px;
          margin: 0 15px;
        }
        .form-options {
          flex-direction: column;
          gap: 15px;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background Layer -->
    <div class="bg-layer" aria-hidden="true">
      <div class="bg-gradient"></div>
      <div class="bg-grid"></div>
      <div class="bg-orb bg-orb-1"></div>
      <div class="bg-orb bg-orb-2"></div>
    </div>

    <header id="header">
      <div class="container">
        <div class="nav">
          <img
            src="images/Logok.png"
            alt="KërLink Logo"
            class="logo"
            data-magnetic
          />
          <nav aria-label="Navigation principale">
            <a href="acceuil.html" data-magnetic>Accueil</a>
            <a href="Rechercher.html" data-magnetic>Rechercher</a>
            <a href="Publier.html" data-magnetic>Publier</a>
            <a href="Connexion.html" data-magnetic>Connexion</a>
            <a href="A propos.html" data-magnetic>À propos</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="login-card">
        <div class="login-header">
          <h2>Content de vous revoir</h2>
          <p>Connectez-vous pour continuer</p>
        </div>

        <form id="login-form">
          <div class="form-group">
            <div class="input-wrapper">
              <input
                type="email"
                name="email"
                placeholder="Adresse email"
                required
              />
              <!-- Icône Email -->
              <svg
                class="input-icon"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                ></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <div class="input-wrapper">
              <input
                type="password"
                name="password"
                placeholder="Mot de passe"
                required
              />
              <!-- Icône Cadenas -->
              <svg
                class="input-icon"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember" />
              Se souvenir de moi
            </label>
            <a href="#" class="forgot-link">Mot de passe oublié ?</a>
          </div>

          <button type="submit" class="btn-primary btn-login" data-magnetic>
            Se connecter
          </button>
        </form>

        <div class="separator">
          <span>ou</span>
        </div>

        <div class="signup-link">
          Pas encore de compte ? <a href="inscription.html">Créer un compte</a>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>
          &copy; 2026 KeurLink - Tous droits réservés | Développé par
          <strong>LACITEBRAND</strong>
        </p>
      </div>
    </footer>

    <div class="cursor-dot" aria-hidden="true"></div>
    <div class="cursor-outline" aria-hidden="true"></div>

    <script src="animations.js"></script>
    <!-- no inline script; header scroll and animations handled in animations.js -->
  </body>
</html>
